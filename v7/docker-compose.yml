version: "3.9"

services:

  # ── MongoDB ────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: portfolio_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ── Backend Express (port 3001) ────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: portfolio_backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app          # hot reload : vos fichiers -> conteneur
      - /app/node_modules       # evite d'ecraser node_modules du conteneur
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongo:27017/portfolio
      - NODE_ENV=development
    env_file:
      - ./backend/.env          # charge JWT_SECRET et ADMIN_PASSWORD_HASH
    depends_on:
      - mongo
    restart: unless-stopped

  # ── Frontend React / Vite (expose sur 8080 cote hote) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: portfolio_frontend
    ports:
      - "8080:5173"             # host:container -> accessible sur http://localhost:8080
    volumes:
      - ./frontend:/app         # hot reload
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
