version: "3.9"

services:

  # ── Backend Express (port 3001) ────────────────────────
  # Se connecte à MongoDB installé sur l'hôte Windows via host.docker.internal
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: portfolio_backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app          # hot reload : vos fichiers → conteneur
      - /app/node_modules       # évite d'écraser node_modules du conteneur
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://host.docker.internal:27017/portfolio
      - NODE_ENV=development
    env_file:
      - ./backend/.env          # charge JWT_SECRET et ADMIN_PASSWORD_HASH
    extra_hosts:
      - "host.docker.internal:host-gateway"   # nécessaire sur Linux, sans effet sur Windows
    restart: unless-stopped

  # ── Frontend React / Vite (port 5173) ─────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: portfolio_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app         # hot reload
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped